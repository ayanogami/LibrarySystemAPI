name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    env:
      SDKMAN_DIR: ${{ github.workspace }}/.sdkman
      SPRING_DATASOURCE_USERNAME: ${{ secrets.CI_DB_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: library_system_test
          POSTGRES_USER: ${{ secrets.CI_DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ secrets.CI_DB_USERNAME }} -d library_system_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: .sdkman
          key: sdkman-java-21.0.11-tem-${{ runner.os }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up JDK 21 with SDKMAN
        shell: bash
        run: |
          if [ ! -s "${SDKMAN_DIR}/bin/sdkman-init.sh" ]; then
            curl -s "https://get.sdkman.io" | bash
          fi
          source "${SDKMAN_DIR}/bin/sdkman-init.sh"
          sed -i 's/sdkman_auto_answer=false/sdkman_auto_answer=true/' "${SDKMAN_DIR}/etc/config"
          sdk install java 21.0.11-tem
          sdk use java 21.0.11-tem
          echo "JAVA_HOME=${SDKMAN_DIR}/candidates/java/current" >> "${GITHUB_ENV}"
          echo "${SDKMAN_DIR}/candidates/java/current/bin" >> "${GITHUB_PATH}"
          java -version

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon
